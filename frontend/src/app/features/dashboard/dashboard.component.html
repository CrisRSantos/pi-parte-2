<div class="dashboard-container">
  <header class="dashboard-header">
    <h1>Dashboard</h1>
    <p>Bem-vindo ao PetCare - Seu sistema de gestão veterinária</p>
  </header>

  <div class="stats-grid">
    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon pets">🐾</div>
        <h3>Total de Pets</h3>
        <p class="stat-value">{{ stats.totalPets }}</p>
        <button mat-stroked-button color="primary" routerLink="/pets">
          Ver Todos
        </button>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon agendamentos">📅</div>
        <h3>Agendamentos Próximos</h3>
        <p class="stat-value">{{ stats.agendamentosProximos }}</p>
        <button mat-stroked-button color="accent" routerLink="/agendamento">
          Agendar
        </button>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon vacinas">💉</div>
        <h3>Vacinas Próximas</h3>
        <p class="stat-value">{{ stats.vacinasVencidas }}</p>
        <button mat-stroked-button color="warn" routerLink="/lembretes">
          Ver
        </button>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon consultas">🏥</div>
        <h3>Consultas Próximas</h3>
        <p class="stat-value">{{ stats.consultasProximas }}</p>
        <button mat-stroked-button routerLink="/pets">Detalhes</button>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="quick-actions">
    <h2>Ações Rápidas</h2>
    <div class="actions-grid">
      <button mat-raised-button color="primary" routerLink="/pets">
        <mat-icon>pets</mat-icon>
        Meus Pets
      </button>
      <button mat-raised-button color="accent" routerLink="/agendamento">
        <mat-icon>event</mat-icon>
        Agendar Consulta
      </button>
      <button mat-raised-button color="warn" routerLink="/lembretes">
        <mat-icon>notifications</mat-icon>
        Verificar Lembretes
      </button>
      <button mat-raised-button routerLink="/pets">
        <mat-icon>history</mat-icon>
        Histórico Médico
      </button>
    </div>
  </div>
</div>
